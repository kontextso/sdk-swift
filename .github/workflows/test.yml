name: Tests

on:
  push:
    branches: ["**"]

jobs:
  test:
    name: Run tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme KontextSwiftSDK \
            -destination 'platform=iOS Simulator,name=Any iOS Simulator Device'
